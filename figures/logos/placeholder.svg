<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="70" viewBox="0 0 300 70">
  <defs>
    <!-- Pipeline gradient -->
    <linearGradient id="pipelineFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    
    <!-- Node gradients -->
    <radialGradient id="nodeGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </radialGradient>
    <radialGradient id="nodeGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="nodeGrad3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="70" fill="#fafbfc" stroke="#e2e8f0" stroke-width="1" rx="6"/>

  <!-- Pipeline Base Line -->
  <line x1="30" y1="35" x2="270" y2="35" stroke="url(#pipelineFlow)" stroke-width="3" opacity="0.3"/>

  <!-- Stage 1: Development/Spring Boot -->
  <g transform="translate(30, 20)">
    <!-- Node -->
    <circle cx="0" cy="15" r="8" fill="url(#nodeGrad1)" stroke="#ffffff" stroke-width="2"/>
    <text x="0" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">SB</text>
    
    <!-- Label -->
    <rect x="-25" y="30" width="50" height="16" fill="#f8fafc" stroke="#e2e8f0" rx="8"/>
    <text x="0" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="500" fill="#475569">DEV</text>
  </g>

  <!-- Pipeline Connector 1 -->
  <g transform="translate(70, 35)">
    <rect x="0" y="-2" width="60" height="4" fill="url(#pipelineFlow)" rx="2"/>
    <!-- Data flow indicators -->
    <circle cx="15" cy="0" r="1.5" fill="#ffffff" opacity="0.8">
      <animate attributeName="cx" values="15;45;15" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Stage 2: Build/Package -->
  <g transform="translate(150, 20)">
    <!-- Node -->
    <circle cx="0" cy="15" r="8" fill="url(#nodeGrad2)" stroke="#ffffff" stroke-width="2"/>
    <!-- Gear icon -->
    <path d="M-3,-3 L3,-3 L3,3 L-3,3 Z M0,-6 L0,6 M-6,0 L6,0" stroke="white" stroke-width="1.5" fill="none"/>
    
    <!-- Label -->
    <rect x="-25" y="30" width="50" height="16" fill="#f8fafc" stroke="#e2e8f0" rx="8"/>
    <text x="0" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="500" fill="#475569">BUILD</text>
  </g>

  <!-- Pipeline Connector 2 -->
  <g transform="translate(190, 35)">
    <rect x="0" y="-2" width="60" height="4" fill="url(#pipelineFlow)" rx="2"/>
    <!-- Data flow indicators -->
    <circle cx="15" cy="0" r="1.5" fill="#ffffff" opacity="0.8">
      <animate attributeName="cx" values="15;45;15" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Stage 3: Deploy/AWS Lightsail -->
  <g transform="translate(270, 20)">
    <!-- Node -->
    <circle cx="0" cy="15" r="8" fill="url(#nodeGrad3)" stroke="#ffffff" stroke-width="2"/>
    <!-- Cloud icon -->
    <path d="M-4,13 Q-6,10 -4,8 Q-2,6 2,7 Q4,5 6,8 Q8,7 9,10 Q10,13 8,15 L-2,15 Q-4,15 -4,13" fill="white" stroke="none"/>
    
    <!-- Label -->
    <rect x="-30" y="30" width="60" height="16" fill="#f8fafc" stroke="#e2e8f0" rx="8"/>
    <text x="0" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" font-weight="500" fill="#475569">LIGHTSAIL</text>
  </g>

  <!-- Course Title -->
  <g transform="translate(150, 60)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155">
      Spring Boot Deployment Pipeline
    </text>
  </g>

  <!-- Status Indicators -->
  <g transform="translate(15, 10)">
    <!-- Active indicator -->
    <circle cx="0" cy="0" r="2" fill="#10b981">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="8" y="2" font-family="system-ui, sans-serif" font-size="7" fill="#6b7280">ACTIVE</text>
  </g>
</svg>